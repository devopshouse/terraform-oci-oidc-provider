# Place this file at .github/workflows/oci-auth.yml in your repository.
# It shows how to exchange the GitHub OIDC token for an OCI UPST and
# authenticate with OCIR using the secrets provisioned by this module.

name: OCI authentication example

on:
  push:
    branches: [main]
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required to request the GitHub OIDC JWT
      contents: read

    steps:
      - uses: actions/checkout@v4

      # Step 1: Exchange the GitHub OIDC token for an OCI UPST.
      # The UPST impersonates the IDCS service user provisioned by the module
      # and can be used with any OCI SDK or CLI call.
      - name: Get OCI UPST
        id: oci_auth
        env:
          OCI_OIDC_CONFIG: ${{ secrets.OCI_OIDC_CONFIG }}
        run: |
          IDCS_ENDPOINT=$(echo "$OCI_OIDC_CONFIG" | jq -r '.oci_idcs_endpoint')
          CLIENT_ID=$(echo "$OCI_OIDC_CONFIG"     | jq -r '.oci_client_id')
          CLIENT_SECRET=$(echo "$OCI_OIDC_CONFIG" | jq -r '.oci_client_secret')

          # Request the GitHub OIDC JWT with the OCI audience.
          GITHUB_JWT=$(curl -sSfL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://cloud.oracle.com" \
            | jq -r '.value')

          # Exchange the GitHub JWT for an OCI UPST.
          UPST=$(curl -sSf -X POST "${IDCS_ENDPOINT}/oauth2/v1/token" \
            -u "${CLIENT_ID}:${CLIENT_SECRET}" \
            -d "grant_type=urn:ietf:params:oauth:grant-type:token-exchange" \
            -d "requested_token_type=urn:oci:token-type:oci-upst" \
            -d "subject_token=${GITHUB_JWT}" \
            -d "subject_token_type=urn:ietf:params:oauth:token-type:jwt" \
            | jq -r '.token')

          echo "::add-mask::${UPST}"
          echo "upst=${UPST}" >> "$GITHUB_OUTPUT"

      # Step 2: Authenticate with OCIR for Docker operations.
      - name: Log in to OCIR
        env:
          OCI_OIDC_CONFIG: ${{ secrets.OCI_OIDC_CONFIG }}
        run: |
          OCIR_URL=$(echo "$OCI_OIDC_CONFIG"      | jq -r '.ocir_url')
          OCIR_USER=$(echo "$OCI_OIDC_CONFIG"     | jq -r '.ocir_username')
          OCIR_PASSWORD=$(echo "$OCI_OIDC_CONFIG" | jq -r '.ocir_password')
          echo "$OCIR_PASSWORD" | docker login "${OCIR_URL}" -u "${OCIR_USER}" --password-stdin

      # Step 3: Use the UPST with OCI CLI or an OCI SDK.
      # Export OCI_CLI_AUTH=security_token and write the UPST to a token file,
      # or pass it directly to SDK calls via the security_token_file config.
      - name: Example OCI CLI call
        env:
          OCI_OIDC_CONFIG: ${{ secrets.OCI_OIDC_CONFIG }}
          OCI_UPST: ${{ steps.oci_auth.outputs.upst }}
        run: |
          REGION=$(echo "$OCI_OIDC_CONFIG"        | jq -r '.oci_region')
          COMPARTMENT=$(echo "$OCI_OIDC_CONFIG"   | jq -r '.oci_compartment_id')
          echo "Authenticated to region=${REGION}, compartment=${COMPARTMENT}"
          # oci compute instance list --compartment-id "${COMPARTMENT}" ...
