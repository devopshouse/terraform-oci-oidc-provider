# Place this file at .gitlab-ci.yml in your repository.
# Requires one masked CI/CD variable (Settings → CI/CD → Variables):
#   OCI_OIDC_CONFIG — from: terraform output -raw ci_oidc_config_json
#
# The aud value below must match gitlab.audience in your terraform.tfvars
# (default: "https://cloud.oracle.com").

stages:
  - deploy

oci-auth-example:
  stage: deploy
  image: ubuntu:22.04
  id_tokens:
    OCI_TOKEN:
      aud: "https://cloud.oracle.com"
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl jq docker.io

  script:
    # Step 1: Exchange the GitLab OIDC token for an OCI UPST.
    # $OCI_TOKEN is injected automatically by GitLab when id_tokens is configured.
    - |
      IDCS_ENDPOINT=$(echo "$OCI_OIDC_CONFIG" | jq -r '.oci_idcs_endpoint')
      CLIENT_ID=$(echo "$OCI_OIDC_CONFIG"     | jq -r '.oci_client_id')
      CLIENT_SECRET=$(echo "$OCI_OIDC_CONFIG" | jq -r '.oci_client_secret')

      UPST=$(curl -sSf -X POST "${IDCS_ENDPOINT}/oauth2/v1/token" \
        -u "${CLIENT_ID}:${CLIENT_SECRET}" \
        -d "grant_type=urn:ietf:params:oauth:grant-type:token-exchange" \
        -d "requested_token_type=urn:oci:token-type:oci-upst" \
        -d "subject_token=${OCI_TOKEN}" \
        -d "subject_token_type=urn:ietf:params:oauth:token-type:jwt" \
        | jq -r '.token')

      export OCI_UPST="${UPST}"

    # Step 2: Authenticate with OCIR for Docker operations.
    - |
      OCIR_URL=$(echo "$OCI_OIDC_CONFIG"      | jq -r '.ocir_url')
      OCIR_USER=$(echo "$OCI_OIDC_CONFIG"     | jq -r '.ocir_username')
      OCIR_PASSWORD=$(echo "$OCI_OIDC_CONFIG" | jq -r '.ocir_password')
      echo "$OCIR_PASSWORD" | docker login "${OCIR_URL}" -u "${OCIR_USER}" --password-stdin

    # Step 3: Use the UPST with the OCI CLI or SDK here.
    - |
      REGION=$(echo "$OCI_OIDC_CONFIG"      | jq -r '.oci_region')
      COMPARTMENT=$(echo "$OCI_OIDC_CONFIG" | jq -r '.oci_compartment_id')
      echo "Authenticated to region=${REGION}, compartment=${COMPARTMENT}"
      # oci compute instance list --compartment-id "${COMPARTMENT}" ...

  only:
    - main
